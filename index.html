  .legend {

    box-shadow: 0 4px 20px rgba(0,0,0,0.15);

  }
  .legend h3 { font-size: 14px; margin-bottom: 8px; color: #333; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  
  .filter-panel {

  .filter-panel input[type="checkbox"] { accent-color: #ff6b00; }
  
  .leaflet-popup-content-wrapper { border-radius: 10px !important; }
  .popup-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 8px; }
  .popup-info { font-size: 12px; color: #666; line-height: 1.8; }

  {name:"新零售-南昌仓",type:"新零售仓",addr:"南昌",lat:28.68,lng:115.86,expire:"-",color:"#9b59b6",supplier:"顺丰",area:"-"},

  {name:"新零售-深圳仓",type:"新零售仓",addr:"深圳",lat:22.54,lng:114.06,expire:"-",color:"#9b59b6",supplier:"顺丰",area:"-"},
  {name:"新零售-北京仓",type:"新零售仓",addr:"北京",lat:39.90,lng:116.41,expire:"-",color:"#9b59b6",supplier:"顺丰",area:"-"},
];

// 初始化地图
const map = L.map('map', {
  center: [35.5, 108],
  zoom: 5,
  zoomControl: false
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

// 地图瓦片（高德地图）
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains: '1234',
  attribution: '© 高德地图',
  maxZoom: 18
}).addTo(map);

// 创建标记图标
function createIcon(color, size) {
  return L.divIcon({
    className: 'custom-marker',
    html: `<div style="
      width:${size}px; height:${size}px; 
      background:${color}; 
      border:2.5px solid white; 
      border-radius:50%; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    "></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

// 计算过期状态
function getExpireStatus(expire) {
  if (expire === '-') return { text: '未知', cls: '' };
  const d = new Date(expire);
  const now = new Date('2026-05-27');
  const days = Math.floor((d - now) / (1000*60*60*24));
  if (days < 0) return { text: `已过期 ${Math.abs(days)} 天`, cls: 'expire-urgent' };
  if (days <= 180) return { text: `剩余 ${days} 天`, cls: days <= 30 ? 'expire-urgent' : 'expire-warn' };
  return { text: `剩余 ${days} 天`, cls: 'expire-ok' };
}

// 按类型分组
const layerGroups = {};
const allMarkers = [];

warehouses.forEach(w => {
  const expireInfo = getExpireStatus(w.expire);
  const isUrgent = expireInfo.cls === 'expire-urgent';
  const markerSize = w.type === '新零售仓' ? 10 : 14;
  
  const marker = L.marker([w.lat, w.lng], {
    icon: createIcon(w.color, markerSize)
  });
  
  marker.bindPopup(`
    <div class="popup-title">${w.name}</div>
    <div class="popup-info">
      📍 地址：<span>${w.addr}</span><br>
      📋 类型：<span>${w.type}</span><br>
      ${w.supplier ? `🤝 供应商：<span>${w.supplier}</span><br>` : ''}
      ${w.area !== '-' ? `📐 面积：<span>${w.area}</span><br>` : ''}
      ${expireInfo.text ? `⏰ 合同：<span class="popup-expire ${expireInfo.cls}">${w.expire === '-' ? '待确认' : w.expire}（${expireInfo.text}）</span>` : ''}
    </div>
  `, { maxWidth: 300 });
  
  if (!layerGroups[w.type]) layerGroups[w.type] = [];
  layerGroups[w.type].push(marker);
  allMarkers.push(marker);
});

// 添加所有标记到地图
Object.values(layerGroups).flat().forEach(m => m.addTo(map));

// 切换图层
function toggleLayer(type) {
  const markers = layerGroups[type];
  if (!markers) return;
  markers.forEach(m => {
    if (map.hasLayer(m)) map.removeLayer(m);
    else m.addTo(map);
  });
}

// 过期仓库高亮闪烁
warehouses.forEach((w, i) => {
  if (getExpireStatus(w.expire).cls === 'expire-urgent') {
    const pulse = L.circleMarker([w.lat, w.lng], {
      radius: 20, color: '#e74c3c', fillColor: '#e74c3c',
      fillOpacity: 0.15, weight: 2, opacity: 0.6
    }).addTo(map);
  }
});
</script>
</body>
