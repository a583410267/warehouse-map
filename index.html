*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
#map{width:100%;height:100vh}

.map-header{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:linear-gradient(135deg,#ff6b00,#ff8c33);
  color:#fff;padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;

}
.map-header h1{font-size:16px;font-weight:600}
.map-header .stats{font-size:12px;opacity:.9}

.filter-panel{
  position:fixed;top:54px;right:16px;z-index:1000;
  background:#fff;border-radius:12px;padding:14px 18px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);font-size:13px;min-width:150px
}
.filter-panel strong{display:block;margin-bottom:8px;font-size:14px;color:#333}
.filter-panel label{display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 0;font-size:13px}
.filter-panel input[type=checkbox]{accent-color:#ff6b00}
.filter-panel hr{border:none;border-top:1px solid #eee;margin:8px 0}
.filter-hint{font-size:11px;color:#999;margin-top:6px;line-height:1.4}

.coverage-panel{
  position:fixed;top:54px;left:16px;z-index:1000;
  background:#fff;border-radius:12px;padding:14px 16px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);font-size:12px;
  min-width:280px;max-height:70vh;overflow-y:auto;display:none
}
.coverage-panel.show{display:block}
.coverage-panel h3{font-size:14px;color:#ff6b00;margin-bottom:10px}
.cov-row{display:flex;align-items:center;margin-bottom:4px;font-size:11px}
.cov-prov{width:50px;text-align:right;padding-right:6px;color:#555}
.cov-bar-wrap{flex:1;height:10px;background:#f0f0f0;border-radius:5px;overflow:hidden}
.cov-bar{height:100%;border-radius:5px;background:#ff6b00}
.cov-pct{width:50px;padding-left:6px;color:#333}
.close-btn{position:absolute;top:8px;right:10px;cursor:pointer;color:#999;font-size:18px}

.layer-btn{
  position:fixed;bottom:24px;right:24px;z-index:1000;
  background:#fff;border:2px solid #ff6b00;color:#ff6b00;
  border-radius:10px;padding:10px 16px;
  font-size:13px;font-weight:500;cursor:pointer;
  box-shadow:0 4px 15px rgba(255,107,0,.3)
}
.layer-btn.active{background:#ff6b00;color:#fff}

.legend{
  position:fixed;bottom:80px;left:24px;z-index:1000;
  background:#fff;border-radius:12px;padding:14px 18px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);font-size:12px;line-height:1.9
}
.legend h3{font-size:13px;margin-bottom:6px;color:#333}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}

.leaflet-popup-content-wrapper{border-radius:10px!important}
.popup-title{font-size:15px;font-weight:600;color:#333;margin-bottom:6px}
.popup-subtype{display:inline-block;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:500;margin-bottom:6px;background:#eee;color:#555}
.popup-info{font-size:12px;color:#666;line-height:1.8}
.popup-info span{color:#333;font-weight:500}
.popup-expire{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin-top:4px}
.expire-urgent{background:#fee;color:#c0392b}
.expire-warn{background:#fff3e0;color:#e67e22}
.expire-ok{background:#e8f5e9;color:#27ae60}
.popup-btn{display:inline-block;margin-top:8px;padding:5px 12px;background:#ff6b00;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer}
.popup-btn:hover{background:#e55a00}

"中小件-合肥仓":"中小件-合肥仓",
"中小件-泉州仓":"中小件-泉州仓",
"中小件-昆明仓":"中小件-昆明仓",
"中小件-兰州仓":"中小件-兰州仓",
"中小件-乌鲁木齐仓":"中小件-乌鲁木齐仓"
};

/* ===== 地图初始化 ===== */
var map = L.map("map",{center:[35.5,108],zoom:5,zoomControl:false});
L.control.zoom({position:"bottomright"}).addTo(map);
L.tileLayer("https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=7&x={x}&y={y}&z={z}",{
  subdomains:"1234",attribution:"高德地图",maxZoom:18
}).addTo(map);

/* 图层组 */
var layerGroups={"中小件仓":L.layerGroup().addTo(map),"有品仓":L.layerGroup().addTo(map),"新零售仓":L.layerGroup().addTo(map)};
var coverageLayer=L.layerGroup();
var expiringMarkers=L.layerGroup().addTo(map);
var allMarkers={};
var coverageOn=false;

function icon(color,size){
  return L.divIcon({className:"custom-marker",
    html:'<div style="width:'+size+'px;height:'+size+'px;background:'+color+';border:2.5px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.35)"></div>',
    iconSize:[size,size],iconAnchor:[size/2,size/2]});
}

function expireStatus(exp){
  if(!exp)return{text:"待确认",cls:""};
  var d=new Date(exp),now=new Date("2026-05-27");
  var days=Math.floor((d-now)/86400000);
  if(days<0)return{text:"已过期"+Math.abs(days)+"天",cls:"expire-urgent"};
  if(days<=180)return{text:"剩余"+days+"天",cls:days<=30?"expire-urgent":"expire-warn"};
  return{text:"剩余"+days+"天",cls:"expire-ok"};
}

/* 渲染标记 */
for(var wi=0;wi<warehouses.length;wi++){
  var w=warehouses[wi];
  var ei=expireStatus(w.expire);
  var ms=w.type==="新零售仓"?10:14;
  var m=L.marker([w.lat,w.lng],{icon:icon(w.subColor,ms)});
  
  var hasCov=nameMap[w.name]&&shippingData[nameMap[w.name]];
  var covBtn=hasCov?'<br><button class="popup-btn" onclick="showCoverage(\''+w.name+'\')">🗺 查看覆盖区域</button>':"";
  
  m.bindPopup('<div class="popup-title">'+w.name+'</div>'
    +'<span class="popup-subtype">'+w.subType+'</span>'
    +'<div class="popup-info">📍 地址：<span>'+w.addr+'</span><br>🤝 供应商：<span>'+(w.supplier||"待确认")+'</span><br>'
    +'⏰ 合同到期：<span class="popup-expire '+ei.cls+'">'+(w.expire||"待确认")+"（"+ei.text+'）</span></div>'
    +covBtn,{maxWidth:340});
  
  m.addTo(layerGroups[w.type]);
  allMarkers[w.name]=m;
  
  if(ei.cls==="expire-urgent"||ei.cls==="expire-warn"){
    L.circleMarker([w.lat,w.lng],{radius:20,color:"#e74c3c",fillColor:"#e74c3c",fillOpacity:.12,weight:2,opacity:.5}).addTo(expiringMarkers);
  }
}

/* 覆盖区域 */
function drawCoverage(name,dest){
  coverageLayer.clearLayers();
  var w=null;
  for(var i=0;i<warehouses.length;i++){if(warehouses[i].name===name){w=warehouses[i];break;}}
  if(!w||!dest)return;
  var total=0,maxV=0;
  var keys=Object.keys(dest);
  for(var k=0;k<keys.length;k++){total+=dest[keys[k]][0];if(dest[keys[k]][0]>maxV)maxV=dest[keys[k]][0];}
  
  for(var j=0;j<Math.min(keys.length,5);j++){
    var prov=keys[j];
    var cnt=dest[prov][0],lng=dest[prov][1],lat=dest[prov][2];
    var wd=(cnt/maxV*12)+2,op=(cnt/maxV*.7)+.3;
    
    L.polyline([[w.lat,w.lng],[lat,lng]],{color:"#ff6b00",weight:wd,opacity:op,dashArray:"5,8"}).addTo(coverageLayer);
    L.circleMarker([lat,lng],{radius:(cnt/maxV*12)+4,fillColor:"#ff6b00",fillOpacity:.6,color:"#fff",weight:1.5,opacity:.9})
      .bindTooltip(prov+": "+cnt.toLocaleString()+"单 ("+(cnt/total*100).toFixed(1)+"%)",{direction:"top",offset:[0,-10]})
      .addTo(coverageLayer);
  }
  L.circleMarker([w.lat,w.lng],{radius:16,fillColor:w.subColor,fillOpacity:.4,color:w.subColor,weight:3,opacity:.8}).addTo(coverageLayer);
}

function showCoverage(name){
  var key=nameMap[name]||name;
  var dest=shippingData[key];
  if(!dest){alert("暂无该仓库的发货数据");return;}
  
  var w=null;for(var i=0;i<warehouses.length;i++){if(warehouses[i].name===name){w=warehouses[i];break;}}
  document.getElementById("panelTitle").textContent=w.name+" 的覆盖区域";
  
  var total=0,maxV=0;
  var keys=Object.keys(dest);
  for(var k=0;k<keys.length;k++){total+=dest[keys[k]][0];if(dest[keys[k]][0]>maxV)maxV=dest[keys[k]][0];}
  
  var html='<div style="margin-bottom:10px;font-size:11px;color:#888">总发货量: '+total.toLocaleString()+" 单</div>";
  /* 排序 */
  var sorted=[];
  for(var s=0;s<keys.length;s++)sorted.push({p:keys[s],v:dest[keys[s]][0]});
  sorted.sort(function(a,b){return b.v-a.v});
  
  for(var r=0;r<Math.min(sorted.length,6);r++){
    var prov=sorted[r].p,cnt=sorted[r].v;
    html+='<div class="cov-row"><div class="cov-prov">'+prov+'</div>'
      +'<div class="cov-bar-wrap"><div class="cov-bar" style="width:'+(cnt/maxV*100)+'%"></div></div>'
      +'<div class="cov-pct">'+cnt.toLocaleString()+" ("+(cnt/total*100).toFixed(1)+"%)</div></div>";
  }
  document.getElementById("panelContent").innerHTML=html;
  document.getElementById("coveragePanel").classList.add("show");
  drawCoverage(name,dest);
  
  for(var i=0;i<warehouses.length;i++){
    if(warehouses[i].name===name){map.setView([warehouses[i].lat,warehouses[i].lng],6,{animate:true});break;}
  }
}

function toggleCoverage(){
  coverageOn=!coverageOn;
  var btn=document.getElementById("coverBtn");
  if(coverageOn){btn.classList.add("active");btn.textContent="🗺 隐藏覆盖区域";}
  else{btn.classList.remove("active");btn.textContent="🗺 显示覆盖区域";coverageLayer.clearLayers();document.getElementById("coveragePanel").classList.remove("show");}
}

function closeCoverage(){document.getElementById("coveragePanel").classList.remove("show");if(coverageOn)toggleCoverage();}

function toggleLayer(type){var g=layerGroups[type];if(map.hasLayer(g))map.removeLayer(g);else g.addTo(map);}
function toggleExpiring(){if(map.hasLayer(expiringMarkers))map.removeLayer(expiringMarkers);else expiringMarkers.addTo(map);}
</script>
</body>
</html>
